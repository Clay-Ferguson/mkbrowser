# ai-models.yaml — the built-in AI model catalog.
#
# This file is the single source of truth for the models MkBrowser ships with.
# It is READ ONLY at runtime: `configMgr.ts` imports it with Vite's `?raw`
# suffix, so the text below is inlined into the main-process bundle at build
# time and parsed by js-yaml on startup. Nothing reads it from disk, and
# nothing ever writes to it — user-defined models live in the user's own
# `config.yaml` instead.
#
# Editing rules:
#  - `defaultModel` must match the `name` of one of the entries below.
#  - `name` is the identity of an entry: it is matched case-insensitively
#    against the user's config, and a default always overwrites a user model of
#    the same name (see `enforceDefaultAIModels` in ai/aiModel.ts). Renaming an
#    entry therefore orphans the old one in existing user configs.
#  - `model` IDs must be unique across the whole catalog.
#  - `provider` must be one of the AI_PROVIDERS in shared/shared.ts.
#  - Prices are USD per 1M tokens.
#
# The schema is validated STRICTLY at load (see `parseAIModelCatalog` in
# configSchema.ts). Unlike the user's config.yaml — which is untrusted, hand
# editable, and degrades per-field — a mistake in this file is a bug in our own
# shipped asset, so it throws loudly rather than silently dropping a model. The
# configMgr unit tests import this module, so a malformed edit here fails the
# test suite immediately.

defaultModel: Claude Haiku 4.5

models:
